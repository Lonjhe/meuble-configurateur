<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Meuble Studio Pro - RA avec Ancrage Sol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/fflate"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/USDZExporter.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --ar-color: #000000; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 250px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; z-index: 20; }
        .sidebar h2 { font-size: 1.1rem; margin-bottom: 30px; border-bottom: 1px solid #3e5871; padding-bottom: 10px; opacity: 0.8; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px; border-radius: 6px; margin-bottom: 5px; display: block; transition: 0.2s; }
        .sidebar a.active { background: var(--accent); color: white; font-weight: bold; }

        .config-panel { width: 320px; background: var(--white); padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 5; overflow-y: auto; }
        .config-group { margin-bottom: 12px; }
        .config-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.75rem; color: #666; }
        .config-group input, .config-group select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9rem; }
        
        .btn-ar { margin-top: 10px; padding: 15px; background: var(--ar-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-ar:disabled { background: #999; cursor: not-allowed; }
        
        #three-container { flex: 1; background: #ced6e0; position: relative; }
        #ar-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; display: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="ar-loader">Génération du modèle RA... <br> Patientez quelques secondes.</div>

    <nav class="sidebar">
        <h2>MEUBLE STUDIO</h2>
        <a href="index.html" class="active">📦 Vue 3D</a>
        <a href="decoupe.html">🪚 Découpe & Perçage</a>
        <a href="notice.html">📖 Notice de Montage</a>
        <a href="cout.html">💶 Analyse des Coûts</a>
    </nav>

    <div class="main-content" style="flex:1; display:flex;">
        <div class="config-panel">
            <h3>Dimensions (mm)</h3>
            <div class="config-group"><label>Hauteur</label><input type="number" id="h" value="2000" oninput="updateMeuble()"></div>
            <div class="config-group"><label>Largeur</label><input type="number" id="w" value="1200" oninput="updateMeuble()"></div>
            <div class="config-group"><label>Profondeur</label><input type="number" id="p" value="600" oninput="updateMeuble()"></div>
            
            <h3>Réalité Augmentée</h3>
            <button class="btn-ar" id="btn-ar" onclick="viewInAR()">
                 Voir dans ma pièce
            </button>
            <p style="font-size: 0.65rem; color: #888; text-align: center; margin-top: 8px;">
                Bougez votre iPhone pour détecter le sol.<br>Une cible apparaîtra pour poser le meuble.
            </p>

            <hr>
            <div class="config-group">
                <label>Options</label>
                <select id="portes" onchange="updateMeuble()">
                    <option value="none">Ouvert</option>
                    <option value="double" selected>2 Portes</option>
                </select>
            </div>
            <button style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="location.href='decoupe.html'">Générer Découpe</button>
        </div>

        <div id="three-container"></div>
    </div>

    <script>
        let scene, camera, renderer, controls, meubleGroup;

        function init() {
            const container = document.getElementById('three-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe1e8ed);
            
            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 1, 15000);
            camera.position.set(2500, 1500, 3500);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(2000, 4000, 2000);
            scene.add(light);

            // Aide visuelle au sol pour la 3D
            const grid = new THREE.GridHelper(4000, 40, 0xbdc3c7, 0xdcdde1);
            scene.add(grid);

            meubleGroup = new THREE.Group();
            scene.add(meubleGroup);

            updateMeuble();
            animate();
        }

        function createBoard(w, h, d, x, y, z, color = 0xE3C9A6) {
            const geom = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, y, z);
            return mesh;
        }

        function updateMeuble() {
            while(meubleGroup.children.length > 0) meubleGroup.remove(meubleGroup.children[0]);

            const h = parseFloat(document.getElementById('h').value) || 1000;
            const w = parseFloat(document.getElementById('w').value) || 1000;
            const p = parseFloat(document.getElementById('p').value) || 400;
            const porte = document.getElementById('portes').value;
            const ep = 18;

            // --- CORRECTION DE L'ANCRAGE ---
            // On monte tout le groupe pour que le bas du meuble soit à Y = 0
            const containerGroup = new THREE.Group();

            // Côtés
            containerGroup.add(createBoard(ep, h, p, -w/2 + ep/2, h/2, 0));
            containerGroup.add(createBoard(ep, h, p, w/2 - ep/2, h/2, 0));
            // Top/Bas
            containerGroup.add(createBoard(w - 2*ep, ep, p, 0, h - ep/2, 0));
            containerGroup.add(createBoard(w - 2*ep, ep, p, 0, ep/2, 0));

            if(porte === 'double') {
                const doorMat = 0xFFFFFF;
                containerGroup.add(createBoard(w/2 - 4, h - 4, 19, -w/4, h/2, p/2 + 10, doorMat));
                containerGroup.add(createBoard(w/2 - 4, h - 4, 19, w/4, h/2, p/2 + 10, doorMat));
            }

            meubleGroup.add(containerGroup);
        }

        async function viewInAR() {
            const loader = document.getElementById('ar-loader');
            const btn = document.getElementById('btn-ar');
            
            loader.style.display = 'block';
            btn.disabled = true;

            // Préparation du modèle pour l'export
            // On s'assure que fflate est bien lié
            window.fflate = window.fflate || fflate;

            const exportGroup = meubleGroup.clone();
            // Conversion mm -> mètres (0.001)
            exportGroup.scale.set(0.001, 0.001, 0.001);

            const exporter = new THREE.USDZExporter();
            try {
                const arraybuffer = await exporter.parse(exportGroup);
                const blob = new Blob([arraybuffer], { type: 'model/vnd.usdz+zip' });
                
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                // Paramètre rel="ar" est CRUCIAL pour activer le mode "Placement" d'iOS
                a.setAttribute('rel', 'ar');
                a.appendChild(document.createElement('img')); 
                a.href = url;
                
                loader.style.display = 'none';
                btn.disabled = false;
                
                a.click();
            } catch (err) {
                alert("Erreur de génération RA : " + err.message);
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const container = document.getElementById('three-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        init();
    </script>
</body>
</html>
