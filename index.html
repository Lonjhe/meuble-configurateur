<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Meuble Studio Pro - Conception & RA iOS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/USDZExporter.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --ar-ios: #000000; --bg: #f4f7f6; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 250px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; z-index: 20; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px; border-radius: 6px; margin-bottom: 5px; display: block; }
        .sidebar a.active { background: var(--accent); color: white; font-weight: bold; }

        .config-panel { width: 300px; background: var(--white); padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 5; overflow-y: auto; }
        .config-group { margin-bottom: 15px; }
        .config-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .config-group input, .config-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        
        /* Bouton RA iOS Style Apple */
        .btn-ar-ios { 
            margin-top: 10px; padding: 15px; background: var(--ar-ios); color: white; 
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 0.9rem; transition: 0.3s;
        }
        .btn-ar-ios:hover { background: #333; transform: scale(1.02); }

        #three-container { flex: 1; background: #e1e8ed; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>MEUBLE STUDIO</h2>
        <a href="index.html" class="active">📦 Vue 3D</a>
        <a href="decoupe.html">🪚 Découpe & Perçage</a>
        <a href="notice.html">📖 Notice de Montage</a>
        <a href="cout.html">💶 Analyse des Coûts</a>
    </nav>

    <div class="main-content" style="flex:1; display:flex;">
        <div class="config-panel">
            <h3>Dimensions (mm)</h3>
            <div class="config-group"><label>Hauteur</label><input type="number" id="h" value="2000" oninput="updateMeuble()"></div>
            <div class="config-group"><label>Largeur</label><input type="number" id="w" value="1000" oninput="updateMeuble()"></div>
            <div class="config-group"><label>Profondeur</label><input type="number" id="p" value="500" oninput="updateMeuble()"></div>
            
            <h3>Réalité Augmentée</h3>
            <button class="btn-ar-ios" onclick="viewInAR()">
                 Voir en RA (iPhone)
            </button>
            <p style="font-size: 0.65rem; color: #999; text-align: center; margin-top: 10px;">
                Nécessite iOS 12+ pour le mode Quick Look.
            </p>

            <hr>
            <div class="config-group">
                <label>Aménagement</label>
                <select id="portes" onchange="updateMeuble()">
                    <option value="none">Meuble Ouvert</option>
                    <option value="single">1 Porte Unique</option>
                    <option value="double" selected>2 Portes Battantes</option>
                </select>
            </div>
            <button style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;" onclick="saveAndGo()">
                Générer Découpes
            </button>
        </div>

        <div id="three-container" style="flex:1;"></div>
    </div>

    <script>
        let scene, camera, renderer, controls, meubleGroup;

        function init() {
            const container = document.getElementById('three-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe1e8ed);
            
            camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 1, 10000);
            camera.position.set(2000, 1500, 3000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(2000, 4000, 2000);
            scene.add(light);

            meubleGroup = new THREE.Group();
            scene.add(meubleGroup);

            updateMeuble();
            animate();
        }

        function createBoard(w, h, d, x, y, z) {
            const geom = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: 0xE3C9A6, roughness: 0.6 });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, y, z);
            return mesh;
        }

        function updateMeuble() {
            while(meubleGroup.children.length > 0) meubleGroup.remove(meubleGroup.children[0]);

            const h = parseFloat(document.getElementById('h').value) || 1000;
            const w = parseFloat(document.getElementById('w').value) || 1000;
            const p = parseFloat(document.getElementById('p').value) || 400;
            const porte = document.getElementById('portes').value;
            const ep = 18;

            // Dessin simplifié pour la RA (sans lignes d'arêtes pour optimiser l'export)
            meubleGroup.add(createBoard(ep, h, p, -w/2 + ep/2, h/2, 0)); // G
            meubleGroup.add(createBoard(ep, h, p, w/2 - ep/2, h/2, 0));  // D
            meubleGroup.add(createBoard(w - 2*ep, ep, p, 0, h - ep/2, 0)); // Top
            meubleGroup.add(createBoard(w - 2*ep, ep, p, 0, ep/2, 0)); // Bas

            if(porte === 'double') {
                const doorMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.4 });
                const d1 = new THREE.Mesh(new THREE.BoxGeometry(w/2 - 4, h - 4, 19), doorMat);
                d1.position.set(-w/4, h/2, p/2 + 10);
                const d2 = new THREE.Mesh(new THREE.BoxGeometry(w/2 - 4, h - 4, 19), doorMat);
                d2.position.set(w/4, h/2, p/2 + 10);
                meubleGroup.add(d1, d2);
            }
        }

        // --- MAGIE RA iOS ---
        async function viewInAR() {
            const exporter = new THREE.USDZExporter();
            // L'exportateur convertit le meubleGroup en binaire USDZ
            const arraybuffer = await exporter.parse(meubleGroup);
            const blob = new Blob([arraybuffer], { type: 'model/vnd.usdz+zip' });
            
            // Création du lien invisible pour Quick Look
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('rel', 'ar');
            a.appendChild(document.createElement('img')); // Requis par iOS
            a.href = url;
            a.click(); // Lance ARKit
            
            setTimeout(() => URL.revokeObjectURL(url), 2000);
        }

        function saveAndGo() {
            // Sauvegarde classique pour decoupe.html
            const data = {
                hauteur: document.getElementById('h').value,
                largeur: document.getElementById('w').value,
                profondeur: document.getElementById('p').value,
                porteType: document.getElementById('portes').value,
                hasFond: true, nbShelves: 3, recul: 20
            };
            localStorage.setItem('meubleProject', JSON.stringify(data));
            window.location.href = 'decoupe.html';
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
