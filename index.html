<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Meuble Studio Pro - Conception & RA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://unpkg.com/fflate"></script>
    <script>
        // FORÇAGE : On s'assure que Three.js trouve "fflate" peu importe comment il est chargé
        window.fflate = window.fflate || fflate;
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/USDZExporter.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --ar-color: #000000; --bg: #f4f7f6; --white: #ffffff; --border: #dcdde1; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        .sidebar { width: 250px; background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; z-index: 20; }
        .sidebar h2 { font-size: 1.1rem; margin-bottom: 30px; border-bottom: 1px solid #3e5871; padding-bottom: 10px; opacity: 0.8; }
        .sidebar a { color: #bdc3c7; text-decoration: none; padding: 12px; border-radius: 6px; margin-bottom: 5px; display: block; transition: 0.2s; }
        .sidebar a:hover { background: #34495e; color: white; }
        .sidebar a.active { background: var(--accent); color: white; font-weight: bold; }

        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .workspace { display: flex; flex: 1; overflow: hidden; }
        
        .config-panel { width: 320px; background: var(--white); padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 5; overflow-y: auto; border-right: 1px solid var(--border); }
        .config-panel h3 { margin: 20px 0 10px 0; font-size: 0.9rem; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 5px; text-transform: uppercase; }
        
        .config-group { margin-bottom: 12px; }
        .config-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.75rem; color: #666; }
        .config-group input, .config-group select { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9rem; box-sizing: border-box; }
        
        .btn-ar { margin-top: 10px; padding: 12px; background: var(--ar-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-ar:hover { background: #333; transform: scale(1.02); }
        .btn-generate { margin-top: 15px; padding: 15px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; }

        #three-container { flex: 1; background: #ced6e0; position: relative; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>MEUBLE STUDIO</h2>
        <a href="index.html" class="active">📦 Vue 3D</a>
        <a href="decoupe.html">🪚 Découpe & Perçage</a>
        <a href="notice.html">📖 Notice de Montage</a>
        <a href="cout.html">💶 Analyse des Coûts</a>
    </nav>

    <div class="main-content">
        <div class="workspace">
            <div class="config-panel">
                <h3>Dimensions (mm)</h3>
                <div class="config-group"><label>Hauteur</label><input type="number" id="h" value="2000"></div>
                <div class="config-group"><label>Largeur</label><input type="number" id="w" value="1200"></div>
                <div class="config-group"><label>Profondeur</label><input type="number" id="p" value="600"></div>
                
                <h3>Matériaux</h3>
                <div class="config-group"><label>Bois Structure (mm)</label><input type="number" id="epS" value="18"></div>
                <div class="config-group">
                    <label>Finition</label>
                    <select id="colorPicker">
                        <option value="0xE3C9A6">Chêne Clair</option>
                        <option value="0x5D4037">Noyer Sombre</option>
                        <option value="0xFFFFFF">Blanc Mat</option>
                        <option value="0x2C3E50">Gris Anthracite</option>
                    </select>
                </div>

                <h3>Réalité Augmentée</h3>
                <button class="btn-ar" onclick="viewInAR()">
                     Voir en RA (iPhone/iPad)
                </button>

                <button class="btn-generate" onclick="saveAndGenerate()">
                    Générer la découpe
                </button>
            </div>
            <div id="three-container"></div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, meubleGroup;

        function init() {
            const container = document.getElementById('three-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe1e8ed);
            const aspect = container.clientWidth / container.clientHeight;
            camera = new THREE.PerspectiveCamera(35, aspect, 10, 50000);
            camera.position.set(2500, 1500, 3500);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.6);
            light.position.set(2000, 4000, 2000);
            scene.add(light);

            meubleGroup = new THREE.Group();
            scene.add(meubleGroup);
            updateMeuble();
            animate();
        }

        function createBoard(w, h, d, x, y, z, color) {
            const geom = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: parseInt(color), roughness: 0.7 });
            const mesh = new THREE.Mesh(geom, mat);
            const group = new THREE.Group();
            group.add(mesh);
            group.position.set(x, y, z);
            return group;
        }

        function updateMeuble() {
            while(meubleGroup.children.length > 0) meubleGroup.remove(meubleGroup.children[0]);
            const h = parseFloat(document.getElementById('h').value) || 0;
            const w = parseFloat(document.getElementById('w').value) || 0;
            const p = parseFloat(document.getElementById('p').value) || 0;
            const epS = parseFloat(document.getElementById('epS').value) || 18;
            const color = document.getElementById('colorPicker').value;

            // Simple structure pour test
            meubleGroup.add(createBoard(epS, h, p, -w/2 + epS/2, h/2, 0, color));
            meubleGroup.add(createBoard(epS, h, p, w/2 - epS/2, h/2, 0, color));
            meubleGroup.add(createBoard(w - 2*epS, epS, p, 0, h - epS/2, 0, color));
            meubleGroup.add(createBoard(w - 2*epS, epS, p, 0, epS/2, 0, color));
        }

        async function viewInAR() {
            if (typeof THREE.USDZExporter === 'undefined') {
                alert("L'exportateur USDZ n'est pas chargé correctement.");
                return;
            }

            // Vérification fflate
            if (typeof fflate === 'undefined') {
                alert("La bibliothèque fflate manque à l'appel.");
                return;
            }

            const exportGroup = meubleGroup.clone();
            exportGroup.scale.set(0.001, 0.001, 0.001); // mm -> m

            const exporter = new THREE.USDZExporter();
            try {
                // L'exportateur utilise 'fflate' globalement
                const arraybuffer = await exporter.parse(exportGroup);
                const blob = new Blob([arraybuffer], { type: 'model/vnd.usdz+zip' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.setAttribute('rel', 'ar');
                a.appendChild(document.createElement('img'));
                a.href = url;
                a.click();
            } catch (err) {
                console.error(err);
                alert("Erreur de génération : " + err.message);
            }
        }

        function saveAndGenerate() {
            const data = {
                hauteur: document.getElementById('h').value,
                largeur: document.getElementById('w').value,
                profondeur: document.getElementById('p').value
            };
            localStorage.setItem('meubleProject', JSON.stringify(data));
            window.location.href = 'decoupe.html';
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const container = document.getElementById('three-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', updateMeuble));
        init();
    </script>
</body>
</html>
